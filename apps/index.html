<script>

document.addEventListener(

    "DOMContentLoaded",

    () => {

        const search =
            document.getElementById(
                "appsSearch"
            );

        const table =
            document.getElementById(
                "appsTable"
            );

        const hideEmpty =
            document.getElementById(
                "hideEmpty"
            );

        const favoritesOnly =
            document.getElementById(
                "favoritesOnly"
            );

        function applyFilters() {

            const filter =
                (
                    search?.value ||
                    ""
                )
                .toLowerCase();

            table
                .querySelectorAll(
                    "tbody tr"
                )
                .forEach(

                    row => {

                        let visible =
                            true;

                        if (

                            filter &&
                            !row.innerText
                                .toLowerCase()
                                .includes(
                                    filter
                                )

                        ) {

                            visible =
                                false;

                        }

                        const badges =
                            Number(
                                row.dataset.badges
                            );

                        if (

                            hideEmpty?.checked &&
                            badges === 0

                        ) {

                            visible =
                                false;

                        }

                        if (

                            favoritesOnly?.checked &&
                            typeof isFavorite === "function" &&
                            !isFavorite(
                                row.dataset.slug
                            )

                        ) {

                            visible =
                                false;

                        }

                        row.style.display =
                            visible
                            ? ""
                            : "none";

                    }

                );

        }

        search?.addEventListener(

            "input",

            applyFilters

        );

        hideEmpty?.addEventListener(

            "change",

            applyFilters

        );

        favoritesOnly?.addEventListener(

            "change",

            applyFilters

        );

        applyFilters();

    }

);

</script>
