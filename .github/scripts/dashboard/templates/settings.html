{% extends "base.html" %}

{% block title %}
Settings
{% endblock %}

{% block content %}

<div class="panel">

    <h2>

        Theme

    </h2>

    <select id="theme">

        <option value="light">

            Light

        </option>

        <option value="dark">

            Dark

        </option>

    </select>

</div>


<div class="panel">

    <h2>

        Favorites

    </h2>

    <p>

        Favoriten werden lokal gespeichert.

    </p>

</div>


<div class="panel">

    <h2>

        Local Settings

    </h2>

    <p>

        Einstellungen werden im Browser gespeichert.

    </p>

</div>

{% endblock %}
