name: App Builder

env:
  MONITORED_FILES: "config.json config.yaml config.yml Dockerfile rootfs"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      app:
        description: "App to build"
        required: true
        type: choice
        options:
          # BEGIN_APPS
          - newt
          # END_APPS
      publish:
        description: "Publish to registry"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:

  # ── Manual trigger ──────────────────────────────────────────────────────────
  manual:
    name: Manual build
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/build-app.yaml
    with:
      app: apps/${{ inputs.app }}
      publish: ${{ inputs.publish }}
    secrets: inherit

  # ── Auto trigger (push / PR) ────────────────────────────────────────────────
  init:
    name: Initialize builds
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
      changed_apps: ${{ steps.filter.outputs.changed_apps }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Get changed files
        id: changed_files
        uses: tj-actions/changed-files@v47.0.6

      - name: Find app directories
        id: apps
        uses: home-assistant/actions/helpers/find-addons@master
        with:
          path: apps

      - name: Filter changed apps
        id: filter
        env:
          APPS: ${{ steps.apps.outputs.addons }}
          CHANGED_FILES: ${{ steps.changed_files.outputs.all_changed_files }}
        run: |
          changed_apps=()

          if [[ "${CHANGED_FILES}" =~ \.github/workflows/(hasos_app|build-app)\.(yml|yaml) ]]; then
            changed_apps=(${APPS})
          else
            for app in ${APPS}; do
              for file in ${MONITORED_FILES}; do
                if [[ "${CHANGED_FILES}" =~ ${app}/${file} ]]; then
                  changed_apps+=("${app}")
                  break
                fi
              done
            done
          fi

          if [[ ${#changed_apps[@]} -gt 0 ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "changed_apps=$(jq -nc '$ARGS.positional' --args "${changed_apps[@]}")" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-app:
    name: Build ${{ matrix.app }}
    needs: init
    if: needs.init.outputs.changed == 'true'
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.init.outputs.changed_apps) }}
    uses: ./.github/workflows/build-app.yaml
    with:
      app: ${{ matrix.app }}
      publish: ${{ github.event_name == 'push' }}
    secrets: inherit
