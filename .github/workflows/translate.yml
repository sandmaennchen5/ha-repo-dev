name: Automatic Translation

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "README.md"
      - "DOCS.md"
      - "apps/**/README.md"
      - "apps/**/DOCS.md"
      - "apps/**/translations/de.yaml"
      - "apps/**/translations/de.yml"
      - "apps/**/translations/de.json"
      - ".github/scripts/translate.py"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: i18n
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed files from push
        id: changes
        run: |
          # Get files changed in this push to main
          git diff --name-only HEAD~1 HEAD \
            | grep -E '(README|DOCS|translations/de)' > changed_files.txt || true

          echo "=== Files changed in this push ==="
          cat changed_files.txt || echo "(none)"

          if [ -s changed_files.txt ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch branches
        run: git fetch origin --prune

      - name: Checkout or create i18n-update
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          if git ls-remote --exit-code --heads origin i18n-update; then
            git checkout i18n-update
            git pull origin i18n-update
          else
            git checkout -b i18n-update origin/main
          fi

      - name: Rebase on latest main
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git fetch origin main
          if ! git rebase origin/main; then
            echo "::error::Rebase failed."
            git rebase --abort
            exit 1
          fi

      - name: Update translate.py from main
        if: steps.changes.outputs.has_changes == 'true'
        run: git checkout origin/main -- .github/scripts/translate.py

      - name: Setup Python
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run translator
        if: steps.changes.outputs.has_changes == 'true'
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          TARGET_LANGUAGES: ${{ vars.TARGET_LANGUAGES }}
        run: |
          mkdir -p .i18n_cache
          python .github/scripts/translate.py changed_files.txt

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        id: commit
        run: |
          git add .i18n_cache/ 2>/dev/null || true

          # Add all generated translation files
          find . -type f \( -name "*.en.md" -o -name "*.fr.md" -o -name "*.es.md" \
            -o -name "*.en.yaml" -o -name "*.fr.yaml" -o -name "*.es.yaml" \
            -o -name "*.en.yml" -o -name "*.fr.yml" -o -name "*.es.yml" \
            -o -name "*.en.json" -o -name "*.fr.json" -o -name "*.es.json" \
            -o -name "*.it.md" -o -name "*.pt.md" -o -name "*.nl.md" \
            -o -name "*.pl.md" -o -name "*.ru.md" -o -name "*.ja.md" -o -name "*.zh.md" \) \
            -exec git add {} \; 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No translation changes to commit"
            exit 0
          fi

          git commit -m "chore(i18n): update translations"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push i18n-update
        if: steps.commit.outputs.changed == 'true'
        run: git push origin i18n-update --force-with-lease

      - name: Find existing PR
        id: pr
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUMBER=$(gh pr list \
            --base main \
            --head i18n-update \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$NUMBER" ]; then
            echo "number=" >> "$GITHUB_OUTPUT"
          else
            echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: |
          steps.commit.outputs.changed == 'true' &&
          steps.pr.outputs.number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head i18n-update \
            --title 'chore(i18n): automatic translation update' \
            --body-file - <<'EOF'
          This PR was created automatically by the translation workflow.

          ### Updated

          - Documentation (README, DOCS files)
          - Translation files (*.yaml, *.json)

          Only changed German source files are translated.

          Generated by GitHub Actions.
          EOF

      - name: Update existing PR
        if: |
          steps.commit.outputs.changed == 'true' &&
          steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.pr.outputs.number }}

          gh pr edit "$PR" --body-file - <<EOF
          This PR was updated automatically by the translation workflow.

          ### Updated

          - Documentation (README, DOCS files)
          - Translation files (*.yaml, *.json)

          Only changed German source files are translated.

          Last updated: $(date -Iseconds)
          EOF

      - name: Add labels
        if: |
          steps.commit.outputs.changed == 'true' &&
          steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.pr.outputs.number }}
          gh pr edit "$PR" \
            --add-label i18n \
            --add-label automated || true

      - name: Comment on PR
        if: |
          steps.commit.outputs.changed == 'true' &&
          steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.pr.outputs.number }}
          gh pr comment "$PR" \
            -b "✅ Updated translations - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
