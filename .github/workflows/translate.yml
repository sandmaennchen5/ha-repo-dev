name: Translation

on:
  workflow_dispatch:
    inputs:
      translate_all:
        description: "Translate ALL files"
        type: boolean
        default: false

  push:
    branches: [main]
    paths:
      - "README.md"
      - "DOCS.md"
      - "apps/**/README.md"
      - "apps/**/DOCS.md"
      - "apps/**/translations/de.yaml"
      - "apps/**/translations/de.yml"
      - "apps/**/translations/de.json"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: i18n
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.translate_all }}" >> $GITHUB_OUTPUT
            echo "Run: manual"
          else
            git diff --name-only HEAD~1 HEAD > /tmp/files.txt 2>/dev/null || true
            if grep -qE "(README|DOCS|de.yaml|de.yml|de.json)" /tmp/files.txt 2>/dev/null; then
              echo "mode=false" >> $GITHUB_OUTPUT
              echo "Run: push detected changes"
            else
              echo "mode=skip" >> $GITHUB_OUTPUT
              echo "Run: skip (no changes)"
            fi
          fi

      - uses: actions/setup-python@v5
        if: steps.detect.outputs.mode != 'skip'
        with:
          python-version: "3.12"

      - name: Install Python deps
        if: steps.detect.outputs.mode != 'skip'
        run: pip install requests pyyaml

      - name: Load cache
        if: steps.detect.outputs.mode != 'skip'
        run: |
          mkdir -p .i18n_cache
          git fetch origin i18n-cache 2>/dev/null || true
          git show origin/i18n-cache:.i18n_cache/translation_cache.json > .i18n_cache/translation_cache.json 2>/dev/null || echo '{}' > .i18n_cache/translation_cache.json

      - name: Translate
        if: steps.detect.outputs.mode != 'skip'
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          TARGET_LANGUAGES: ${{ vars.TARGET_LANGUAGES || 'en' }}
        run: |
          if [ "${{ steps.detect.outputs.mode }}" = "true" ]; then
            python3 .github/scripts/translate.py --all
          else
            python3 .github/scripts/translate.py /tmp/files.txt
          fi

      - name: Prepare PR branch
        if: steps.detect.outputs.mode != 'skip'
        id: prep
        run: |
          git fetch origin i18-update 2>/dev/null || true
          git checkout -B i18-update origin/main

          # Stage translation files
          find . -type f \( \
            -name "*.en.md" -o -name "*.fr.md" -o -name "*.es.md" \
            -o -name "*.it.md" -o -name "*.pt.md" -o -name "*.nl.md" \
            -o -name "*.pl.md" -o -name "*.ru.md" -o -name "*.ja.md" -o -name "*.zh.md" \
            -o -name "*.en.yaml" -o -name "*.fr.yaml" -o -name "*.es.yaml" \
            -o -name "*.en.yml" -o -name "*.fr.yml" -o -name "*.es.yml" \
            -o -name "*.en.json" -o -name "*.fr.json" -o -name "*.es.json" \
          \) ! -path "./.git/*" ! -path "./.i18n_cache/*" -print0 | xargs -0 git add 2>/dev/null || true

          echo "staged=$(git diff --cached --name-only | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit
        if: steps.prep.outputs.staged != '0'
        id: commit
        run: |
          git commit -m "chore(i18n): update translations" 2>/dev/null
          echo "done=true" >> $GITHUB_OUTPUT

      - name: Push
        if: steps.commit.outputs.done == 'true'
        run: git push origin i18-update -f

      - name: Save cache
        if: steps.detect.outputs.mode != 'skip'
        run: |
          git fetch origin i18n-cache 2>/dev/null || true
          git checkout -B i18n-cache origin/i18n-cache 2>/dev/null || git checkout --orphan i18n-cache
          git rm -rf . 2>/dev/null || true

          mkdir -p .i18n_cache
          git checkout i18-update -- .i18n_cache 2>/dev/null || true
          git add .i18n_cache 2>/dev/null || true
          git commit -m "chore(i18n): cache" 2>/dev/null || true
          git push origin i18n-cache -f 2>/dev/null || true

      - name: PR
        if: steps.commit.outputs.done == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout i18-update

          PR=$(gh pr list -B main -H i18-update --json number -q '.[0].number' 2>/dev/null || echo "")

          if [ -z "$PR" ]; then
            gh pr create -B main -H i18-update --title "Update translations" --body "Auto translation" --label i18n || true
          fi
