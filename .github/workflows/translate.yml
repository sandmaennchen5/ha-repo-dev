name: Translation

on:
  workflow_dispatch:
    inputs:
      translate_all:
        description: "Translate ALL files"
        type: boolean
        default: false

  push:
    branches: [main]
    paths:
      - "README.md"
      - "DOCS.md"
      - "apps/**/README.md"
      - "apps/**/DOCS.md"
      - "apps/**/translations/de.yaml"
      - "apps/**/translations/de.yml"
      - "apps/**/translations/de.json"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: i18n
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TRANSLATE_ALL="${{ github.event.inputs.translate_all }}"
            if [ "$TRANSLATE_ALL" = "true" ]; then
              echo "mode=all" >> $GITHUB_OUTPUT
              echo "✅ Run: manual translate ALL"
            else
              echo "mode=skip" >> $GITHUB_OUTPUT
              echo "⏭️ Run: manual mode disabled, skipping"
            fi
          else
            git diff --name-only HEAD~1 HEAD > /tmp/files.txt 2>/dev/null || true
            if grep -qE "(README|DOCS|de\.yaml|de\.yml|de\.json)" /tmp/files.txt 2>/dev/null; then
              echo "mode=changed" >> $GITHUB_OUTPUT
              echo "✅ Run: push detected changes"
              echo "📋 Changed files:"
              cat /tmp/files.txt | head -10
            else
              echo "mode=skip" >> $GITHUB_OUTPUT
              echo "⏭️ Run: skip (no translation files changed)"
            fi
          fi

      - uses: actions/setup-python@v5
        if: steps.detect.outputs.mode != 'skip'
        with:
          python-version: "3.12"

      - name: Install Python deps
        if: steps.detect.outputs.mode != 'skip'
        run: pip install requests pyyaml

      - name: Prepare branch
        if: steps.detect.outputs.mode != 'skip'
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch latest remote state
          git fetch origin main 2>/dev/null || true
          git fetch origin i18n-update 2>/dev/null || true

          # Check if there is already an open PR for i18n-update → main
          PR_NUMBER=$(gh pr list --base main --head i18n-update --state open \
            --json number --jq '.[0].number // ""' 2>/dev/null || echo "")

          if [ -n "$PR_NUMBER" ] && git show-ref --verify refs/remotes/origin/i18n-update 2>/dev/null; then
            # Open PR exists – continue building on the existing branch so the
            # cache committed there is automatically available
            git checkout -B i18n-update origin/i18n-update
            # Merge latest main so new source files are picked up (translation
            # files only live in i18n-update, so conflicts are extremely unlikely)
            git merge origin/main --no-edit -m "chore(i18n): sync with main" 2>/dev/null || \
              git merge --abort 2>/dev/null || true
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "✅ Open PR #$PR_NUMBER found – continuing on existing branch"
          else
            # No open PR – start fresh from main
            git checkout -B i18n-update origin/main
            echo "pr_exists=false" >> $GITHUB_OUTPUT
            echo "✅ No open PR – starting fresh from main"
          fi

          # Ensure cache directory exists
          mkdir -p .i18n_cache
          if [ ! -f ".i18n_cache/translation_cache.json" ]; then
            echo "{}" > .i18n_cache/translation_cache.json
            echo "📦 Fresh cache initialised"
          else
            ENTRIES=$(python3 -c \
              "import json; print(len(json.load(open('.i18n_cache/translation_cache.json'))))" \
              2>/dev/null || echo "?")
            echo "📦 Cache loaded: $ENTRIES entries"
          fi

      - name: Translate
        if: steps.detect.outputs.mode != 'skip'
        id: translate
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          TARGET_LANGUAGES: ${{ vars.TARGET_LANGUAGES || 'en' }}
        run: |
          echo "🌍 Environment:"
          echo "  MODE: ${{ steps.detect.outputs.mode }}"
          echo "  TARGET_LANGUAGES: ${TARGET_LANGUAGES}"
          echo "  DEEPL_API_KEY: $([ -z '${{ secrets.DEEPL_API_KEY }}' ] && echo '❌ NOT SET' || echo '✅ SET')"
          echo ""

          if [ "${{ steps.detect.outputs.mode }}" = "all" ]; then
            echo "📝 Running: translate ALL files"
            python3 .github/scripts/translate.py --all
          else
            echo "📝 Running: translate changed files"
            python3 .github/scripts/translate.py /tmp/files.txt
          fi

      - name: Stage and commit
        if: steps.detect.outputs.mode != 'skip'
        id: commit
        run: |
          # Stage generated translation files
          if [ -f ".i18n_cache/generated_files.txt" ]; then
            grep -v '^$' .i18n_cache/generated_files.txt | \
              xargs -I {} git add "{}" 2>/dev/null || true
          fi

          # Force-add cache files into the branch so the next run can reuse them
          git add -f .i18n_cache/translation_cache.json 2>/dev/null || true
          git add -f .i18n_cache/translation_manifest.json 2>/dev/null || true

          STAGED=$(git diff --cached --name-only | wc -l | tr -d ' ')
          echo "staged=$STAGED" >> $GITHUB_OUTPUT

          echo "📄 Staged $STAGED file(s):"
          git diff --cached --name-only

          if [ "$STAGED" -gt 0 ]; then
            git commit \
              -m "chore(i18n): update translations" \
              -m "Mode: ${{ steps.detect.outputs.mode }}" \
              -m "Translations updated; cache committed for next run"
            echo "done=true" >> $GITHUB_OUTPUT
            echo "✅ Committed"
          else
            echo "done=false" >> $GITHUB_OUTPUT
            echo "⚠️ Nothing to commit"
          fi

      - name: Push
        if: steps.commit.outputs.done == 'true'
        run: |
          git push origin i18n-update -f
          echo "✅ Pushed to i18n-update"

      - name: Create or update PR
        if: steps.commit.outputs.done == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.branch.outputs.pr_exists }}" = "true" ]; then
            echo "✅ PR #${{ steps.branch.outputs.pr_number }} updated with new commits"
          else
            BODY="$(cat <<'PREOF'
Automated translations from German source files.

- Translations regenerated using cache
- Only changed files included
- Ready to merge when reviewed

> **Note:** `.i18n_cache/` is committed to this branch to persist the translation
> cache across runs. It is safe to merge – the directory is listed in `.gitignore`
> and will not be accidentally re-committed after the merge.
PREOF
)"
            gh pr create \
              --base main \
              --head i18n-update \
              --title "Translation updates" \
              --body "$BODY" \
              --label i18n \
              --draft || true
            echo "✅ Created new PR"
          fi

      - name: Summary
        if: steps.detect.outputs.mode != 'skip'
        run: |
          echo "=== 📊 Translation Summary ==="
          echo "Mode:      ${{ steps.detect.outputs.mode }}"
          echo "Staged:    ${{ steps.commit.outputs.staged }} file(s)"
          echo "Committed: ${{ steps.commit.outputs.done }}"
          echo "PR exists: ${{ steps.branch.outputs.pr_exists }}"

          if [ -f ".i18n_cache/translation_cache.json" ]; then
            CACHE_SIZE=$(python3 -c \
              "import json; print(len(json.load(open('.i18n_cache/translation_cache.json'))))" \
              2>/dev/null || echo "?")
            echo "Cache:     $CACHE_SIZE entries"
          fi
