name: 🌍 Translation

on:
  workflow_dispatch:
    inputs:
      translate_all:
        description: "Translate ALL files (ignore change detection)"
        required: false
        type: boolean
        default: false

  push:
    branches: [main]
    paths:
      - "README.md"
      - "DOCS.md"
      - "apps/**/README.md"
      - "apps/**/DOCS.md"
      - "apps/**/translations/de.yaml"
      - "apps/**/translations/de.yml"
      - "apps/**/translations/de.json"
      - ".github/scripts/translate.py"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: i18n
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check for changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.translate_all }}" = "true" ]; then
              echo "translate_all=true" >> $GITHUB_OUTPUT
              echo "🔄 Manual run: TRANSLATE ALL"
            else
              echo "translate_all=false" >> $GITHUB_OUTPUT
              echo "🔄 Manual run: changed files only"
            fi
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only HEAD~1 HEAD | grep -E '(README|DOCS|translations/de)' > /tmp/changed.txt || true

            if [ -s /tmp/changed.txt ]; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "translate_all=false" >> $GITHUB_OUTPUT
              echo "📌 Push detected changes:"
              cat /tmp/changed.txt
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "ℹ No translation files changed"
            fi
          fi

      - name: Setup working branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git fetch origin
          git checkout -B i18n-working origin/main

          # Load cache from i18n-cache if exists
          mkdir -p .i18n_cache
          if git fetch origin i18n-cache 2>/dev/null; then
            git show origin/i18n-cache:.i18n_cache/translation_cache.json > .i18n_cache/translation_cache.json 2>/dev/null || echo "{}" > .i18n_cache/translation_cache.json
          else
            echo "{}" > .i18n_cache/translation_cache.json
          fi

          echo "✓ Working branch ready"

      - name: Setup Python
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check.outputs.has_changes == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run translator
        if: steps.check.outputs.has_changes == 'true'
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          TARGET_LANGUAGES: ${{ vars.TARGET_LANGUAGES }}
        run: |
          if [ "${{ steps.check.outputs.translate_all }}" = "true" ]; then
            python .github/scripts/translate.py --all
          else
            python .github/scripts/translate.py /tmp/changed.txt
          fi

      - name: Commit translations
        if: steps.check.outputs.has_changes == 'true'
        id: trans_commit
        run: |
          # Add ONLY translation files (*.en.md, *.fr.yaml, etc.)
          git add -A \
            -- \
            "*.en.md" \
            "*.fr.md" \
            "*.es.md" \
            "*.it.md" \
            "*.pt.md" \
            "*.nl.md" \
            "*.pl.md" \
            "*.ru.md" \
            "*.ja.md" \
            "*.zh.md" \
            "*.en.yaml" \
            "*.fr.yaml" \
            "*.es.yaml" \
            "*.en.yml" \
            "*.fr.yml" \
            "*.es.yml" \
            "*.en.json" \
            "*.fr.json" \
            "*.es.json" \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✓ No translation changes"
          else
            git commit -m "chore(i18n): update translations"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✓ Translations committed"
          fi

      - name: Push to i18n-update
        if: steps.trans_commit.outputs.changed == 'true'
        run: |
          git push origin i18n-working:i18n-update --force-with-lease
          echo "✓ Pushed to i18n-update"

      - name: Update cache on i18n-cache
        if: steps.check.outputs.has_changes == 'true'
        run: |
          # Check if cache was actually updated
          if [ ! -f ".i18n_cache/translation_cache.json" ]; then
            echo "ℹ No cache to update"
            exit 0
          fi

          git fetch origin

          # Create/checkout i18n-cache branch
          if git rev-parse --verify origin/i18n-cache >/dev/null 2>&1; then
            git checkout -B i18n-cache origin/i18n-cache
            git reset --hard origin/i18n-cache
          else
            git checkout --orphan i18n-cache
            git rm -rf . 2>/dev/null || true
          fi

          # Copy cache
          mkdir -p .i18n_cache
          cp .i18n_cache/translation_cache.json .i18n_cache/ 2>/dev/null || true

          # Actually copy from i18n-working since we're in a different ref
          git checkout i18n-working -- .i18n_cache/ 2>/dev/null || true

          git add .i18n_cache/

          if ! git diff --cached --quiet; then
            git commit -m "chore(i18n): update cache"
            git push origin i18n-cache
            echo "✓ Cache updated"
          else
            echo "ℹ Cache unchanged"
          fi

      - name: Find or create PR
        if: steps.trans_commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check for existing PR
          PR_ID=$(gh pr list --base main --head i18n-update --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$PR_ID" ]; then
            gh pr create \
              --base main \
              --head i18n-update \
              --title "🌍 Update translations" \
              --body "Translation update - cache is in separate i18n-cache branch" \
              --label i18n \
              --label automated
            echo "✓ Created new PR"
          else
            echo "✓ PR #$PR_ID already exists (auto-updated)"
          fi
