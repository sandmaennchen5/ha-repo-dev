name: Automatic Translation

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "README.md"
      - "DOCS.md"
      - "apps/**/README.md"
      - "apps/**/DOCS.md"
      - "apps/**/translations/de.yaml"
      - "apps/**/translations/de.yml"
      - "apps/**/translations/de.json"
      - ".github/scripts/translate.py"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: i18n
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed files from push
        id: changes
        run: |
          # Get files changed in this push to main
          git diff --name-only HEAD~1 HEAD \
            | grep -E '(README|DOCS|translations/de)' > changed_files.txt || true

          echo "=== Files changed in this push ==="
          cat changed_files.txt || echo "(none)"

          if [ -s changed_files.txt ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch branches
        run: |
          git fetch origin main --depth=1
          git fetch origin i18n-update --depth=1 || true
          git fetch origin i18n-cache --depth=1 || true

      - name: Checkout or create i18n-update
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          if git ls-remote --exit-code --heads origin i18n-update; then
            git checkout i18n-update
            git pull origin i18n-update
          else
            git checkout -b i18n-update origin/main
          fi

      - name: Rebase on latest main
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git fetch origin main
          if ! git rebase origin/main; then
            echo "::error::Rebase failed."
            git rebase --abort
            exit 1
          fi

      - name: Update translate.py from main
        if: steps.changes.outputs.has_changes == 'true'
        run: git checkout origin/main -- .github/scripts/translate.py

      - name: Setup Python
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Restore cache from i18n-cache branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          mkdir -p .i18n_cache

          # Restore cache from dedicated i18n-cache branch
          if git show origin/i18n-cache:.i18n_cache/translation_cache.json > .i18n_cache/translation_cache.json 2>/dev/null; then
            echo "✓ Cache restored from i18n-cache branch"
          else
            echo "ℹ No cache found, starting fresh"
          fi

      - name: Run translator
        if: steps.changes.outputs.has_changes == 'true'
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          TARGET_LANGUAGES: ${{ vars.TARGET_LANGUAGES }}
        run: |
          python .github/scripts/translate.py changed_files.txt

          # Show cache stats
          if [ -f .i18n_cache/translation_cache.json ]; then
            echo "Cache entries: $(jq 'length' .i18n_cache/translation_cache.json)"
          fi

      - name: Commit translation changes to i18n-update
        if: steps.changes.outputs.has_changes == 'true'
        id: commit
        run: |
          # Add all generated translation files (NOT cache)
          find . -type f \( -name "*.en.md" -o -name "*.fr.md" -o -name "*.es.md" \
            -o -name "*.en.yaml" -o -name "*.fr.yaml" -o -name "*.es.yaml" \
            -o -name "*.en.yml" -o -name "*.fr.yml" -o -name "*.es.yml" \
            -o -name "*.en.json" -o -name "*.fr.json" -o -name "*.es.json" \
            -o -name "*.it.md" -o -name "*.pt.md" -o -name "*.nl.md" \
            -o -name "*.pl.md" -o -name "*.ru.md" -o -name "*.ja.md" -o -name "*.zh.md" \) \
            -exec git add {} \; 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No translation changes to commit"
            exit 0
          fi

          git commit -m "chore(i18n): update translations"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push i18n-update branch
        if: steps.commit.outputs.changed == 'true'
        run: git push origin i18n-update --force-with-lease

      - name: Update cache in i18n-cache branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          CACHE_FILE=".i18n_cache/translation_cache.json"

          if [ ! -f "$CACHE_FILE" ]; then
            echo "ℹ No cache file to update"
            exit 0
          fi

          # Create temporary worktree for i18n-cache branch
          git worktree add /tmp/i18n-cache-work origin/i18n-cache 2>/dev/null || \
            git worktree add /tmp/i18n-cache-work origin/main -b i18n-cache

          cd /tmp/i18n-cache-work

          # Copy cache from main worktree
          mkdir -p .i18n_cache
          cp -v "$GITHUB_WORKSPACE/$CACHE_FILE" .i18n_cache/

          # Commit cache
          git add .i18n_cache/
          if ! git diff --cached --quiet; then
            git commit -m "chore(i18n): update translation cache"
            git push origin i18n-cache
            echo "✓ Cache updated on i18n-cache branch"
          else
            echo "ℹ No cache changes"
          fi

          cd "$GITHUB_WORKSPACE"
          git worktree remove /tmp/i18n-cache-work

      - name: Find existing PR
        if: steps.commit.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUMBER=$(gh pr list \
            --base main \
            --head i18n-update \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$NUMBER" ]; then
            echo "number=" >> "$GITHUB_OUTPUT"
          else
            echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: |
          steps.commit.outputs.changed == 'true' &&
          steps.pr.outputs.number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head i18n-update \
            --title '🌍 Update translations' \
            --body-file - <<'EOF'
          This PR was created automatically by the translation workflow.

          ### Updated

          - Documentation (README, DOCS files)
          - Translation files (*.yaml, *.json)

          Only changed German source files are translated.

          **Note:** Translation cache is maintained separately in the `i18n-cache` branch.

          Generated by GitHub Actions.
          EOF

          PR=$(gh pr view i18n-update --json number --jq .number)
          gh pr edit "$PR" --add-label i18n --add-label automated || true

      - name: Add labels to existing PR
        if: |
          steps.commit.outputs.changed == 'true' &&
          steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.pr.outputs.number }}
          gh pr edit "$PR" \
            --add-label i18n \
            --add-label automated || true
