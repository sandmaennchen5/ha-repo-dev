name: Automatic Translation

on:
  workflow_dispatch:
    inputs:
      translate_all:
        description: "Translate all files (ignore change detection)"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "DOCS.md"
      - "apps/**/README.md"
      - "apps/**/DOCS.md"
      - "apps/**/translations/de.yaml"
      - "apps/**/translations/de.yml"
      - "apps/**/translations/de.json"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: i18n
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check for changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.translate_all }}" = "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "translate_mode=all" >> $GITHUB_OUTPUT
            echo "Translate ALL mode enabled"
          else
            git diff --name-only HEAD~1 HEAD | grep -E '(README|DOCS|translations/de)' > /tmp/changed.txt || true
            if [ -s /tmp/changed.txt ]; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "translate_mode=changed" >> $GITHUB_OUTPUT
              echo "Translate CHANGED files mode"
              cat /tmp/changed.txt
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "No changes detected"
            fi
          fi

      - name: Setup or update i18n-cache branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          if git fetch origin i18n-cache 2>/dev/null; then
            echo "i18n-cache branch exists"
          else
            echo "Creating i18n-cache branch..."
            git checkout --orphan i18n-cache
            git rm -rf .
            mkdir -p .i18n_cache
            echo "{}" > .i18n_cache/translation_cache.json
            echo "{}" > .i18n_cache/changed_files.json
            git add .i18n_cache/
            git commit -m "chore(i18n): initialize cache branch"
            git push -u origin i18n-cache
            git checkout main
          fi

      - name: Setup i18n-working branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git fetch origin
          if git fetch origin i18n-working 2>/dev/null; then
            git checkout i18n-working
            git reset --hard origin/main
          else
            git checkout -b i18n-working origin/main
          fi
          
          # Copy cache from i18n-cache
          git fetch origin i18n-cache
          git checkout origin/i18n-cache -- .i18n_cache 2>/dev/null || mkdir -p .i18n_cache

      - name: Setup Python
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check.outputs.has_changes == 'true'
        run: pip install requests pyyaml

      - name: Run translation
        if: steps.check.outputs.has_changes == 'true'
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          TARGET_LANGUAGES: ${{ vars.TARGET_LANGUAGES }}
          TRANSLATE_MODE: ${{ steps.check.outputs.translate_mode }}
        run: |
          if [ "$TRANSLATE_MODE" = "all" ]; then
            python .github/scripts/translate.py --all
          else
            python .github/scripts/translate.py /tmp/changed.txt
          fi

      - name: Update i18n-cache branch with new cache
        if: steps.check.outputs.has_changes == 'true'
        run: |
          # Save cache to temp location
          cp -r .i18n_cache /tmp/i18n_cache_backup
          
          # Switch to i18n-cache and reset
          git checkout main  # Go back to main first
          git checkout i18n-cache
          git pull origin i18n-cache
          
          # Replace cache with updated version
          rm -rf .i18n_cache
          cp -r /tmp/i18n_cache_backup .i18n_cache
          
          # Commit if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git add .i18n_cache/
            git commit -m "chore(i18n): update cache" || true
            git push origin i18n-cache
          fi

      - name: Extract translations to i18n-update
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git fetch origin
          
          # Go back to main branch first
          git checkout main
          git pull origin main
          
          if git fetch origin i18n-update 2>/dev/null; then
            git checkout i18n-update
            git reset --hard origin/main
          else
            git checkout -b i18n-update origin/main
          fi
          
          # Copy only translation files from i18n-working
          git checkout i18n-working -- . 2>/dev/null || true
          
          # Remove non-translation files (keep only translated content)
          find . -type f ! \( \
            -name "*.en.md" -o -name "*.fr.md" -o -name "*.es.md" \
            -o -name "*.en.yaml" -o -name "*.fr.yaml" -o -name "*.es.yaml" \
            -o -name "*.en.yml" -o -name "*.fr.yml" -o -name "*.es.yml" \
            -o -name "*.en.json" -o -name "*.fr.json" -o -name "*.es.json" \
            -o -name "*.it.md" -o -name "*.pt.md" -o -name "*.nl.md" \
            -o -name "*.pl.md" -o -name "*.ru.md" -o -name "*.ja.md" -o -name "*.zh.md" \
            -o -name ".git*" -o -name ".gitignore" -o -name "README.md" -o -name "DOCS.md" \
            -o -path "*/.github/*" -o -path "*/translations/de.*" \) \
            -delete
          
          # Keep source files (README.md, DOCS.md, de.* translations)
          git checkout origin/main -- README.md DOCS.md 2>/dev/null || true
          find . -path "*/translations/de.*" -exec git checkout origin/main -- {} \;
          
          git add .
          
          if ! git diff --cached --quiet; then
            git commit -m "chore(i18n): update translations from i18n-working" || true
            git push -u origin i18n-update
          fi

      - name: Create or update PR
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_ID=$(gh pr list --base main --head i18n-update --json number --jq '.[0].number' 2>/dev/null || echo "")
          
          if [ -z "$PR_ID" ]; then
            echo "Creating new PR..."
            gh pr create --base main --head i18n-update --title "🌍 Update translations" --body "Automatic translation update" || echo "PR creation in progress or already exists"
          else
            echo "PR #$PR_ID already exists"
          fi

      - name: Cleanup i18n-working branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git push origin --delete i18n-working 2>/dev/null || true
          echo "i18n-working branch deleted"
