name: Translate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "DOCS.md"
      - "apps/**/README.md"
      - "apps/**/DOCS.md"
      - "apps/**/translations/de.*"
      - ".github/scripts/translate.py"

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Create or switch to i18n-update
        run: |
          git fetch origin

          if git ls-remote --exit-code --heads origin i18n-update; then
            git checkout i18n-update
            git pull origin i18n-update
          else
            git checkout -b i18n-update origin/main
          fi

      - name: Merge latest main
        run: |
          git fetch origin main
          git merge origin/main --no-edit || true

      - name: Update translate.py from main
        run: |
          git checkout origin/main -- .github/scripts/translate.py

      - name: Install dependencies
        run: |
          pip install requests pyyaml

      - name: Build translation file list
        run: |
          {
            git ls-files README.md
            git ls-files DOCS.md
            git ls-files "apps/**/README.md"
            git ls-files "apps/**/DOCS.md"
            git ls-files "apps/**/translations/de.yaml"
            git ls-files "apps/**/translations/de.yml"
            git ls-files "apps/**/translations/de.json"
          } | sort -u > files.txt

      - name: Translate
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          TARGET_LANGUAGES: en
        run: |
          python .github/scripts/translate.py files.txt

      - name: Commit changes
        run: |
          git add \
            .translation_cache.json \
            .github/scripts/translate.py \
            README*.md \
            DOCS*.md \
            apps/**/README*.md \
            apps/**/DOCS*.md \
            apps/**/translations/*.yaml \
            apps/**/translations/*.yml \
            apps/**/translations/*.json || true

          if git diff --cached --quiet; then
            echo "Nothing changed."
            exit 0
          fi

          git commit -m "chore(i18n): update translations"

      - name: Push
        run: |
          git push origin i18n-update

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh pr view i18n-update >/dev/null 2>&1; then
            echo "PR already exists."
          else
            gh pr create \
              --base main \
              --head i18n-update \
              --title "Automatic translation update" \
              --body "Automated translation update."
          fi