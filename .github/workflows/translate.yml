name: Automatic Translation

on:
  workflow_dispatch:
    inputs:
      translate_all:
        description: "Translate all files (ignore change detection)"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "DOCS.md"
      - "apps/**/README.md"
      - "apps/**/DOCS.md"
      - "apps/**/translations/de.yaml"
      - "apps/**/translations/de.yml"
      - "apps/**/translations/de.json"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: i18n
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check for changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.translate_all }}" = "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "translate_mode=all" >> $GITHUB_OUTPUT
            echo "Translate ALL mode enabled"
          else
            git diff --name-only HEAD~1 HEAD | grep -E '(README|DOCS|translations/de)' > /tmp/changed.txt || true
            if [ -s /tmp/changed.txt ]; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "translate_mode=changed" >> $GITHUB_OUTPUT
              echo "Translate CHANGED files mode"
              cat /tmp/changed.txt
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "No changes detected"
            fi
          fi

      - name: Setup i18n-working branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git fetch origin
          if git fetch origin i18n-working 2>/dev/null; then
            git checkout i18n-working
            git reset --hard origin/main
          else
            git checkout -b i18n-working origin/main
          fi
          
          # Load or create cache directory
          mkdir -p .i18n_cache
          if git fetch origin i18n-cache 2>/dev/null; then
            git checkout origin/i18n-cache -- .i18n_cache 2>/dev/null || echo "{}" > .i18n_cache/translation_cache.json
          else
            echo "{}" > .i18n_cache/translation_cache.json
          fi

      - name: Setup Python
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check.outputs.has_changes == 'true'
        run: pip install requests pyyaml

      - name: Run translation
        if: steps.check.outputs.has_changes == 'true'
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          TARGET_LANGUAGES: ${{ vars.TARGET_LANGUAGES }}
          TRANSLATE_MODE: ${{ steps.check.outputs.translate_mode }}
        run: |
          if [ "$TRANSLATE_MODE" = "all" ]; then
            python .github/scripts/translate.py --all
          else
            python .github/scripts/translate.py /tmp/changed.txt
          fi

      - name: Commit translations on i18n-working
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore(i18n): add translations" || true
            git push -u origin i18n-working || true
          fi

      - name: Update cache on i18n-cache branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git fetch origin
          
          if git fetch origin i18n-cache 2>/dev/null; then
            git checkout i18n-cache
          else
            git checkout --orphan i18n-cache
            git rm -rf . 2>/dev/null || true
          fi
          
          git reset --hard HEAD 2>/dev/null || true
          rm -rf .i18n_cache
          git checkout i18n-working -- .i18n_cache 2>/dev/null || mkdir -p .i18n_cache
          
          git add .i18n_cache/
          
          if ! git diff --cached --quiet; then
            git commit -m "chore(i18n): update cache" || true
            git push -u origin i18n-cache || true
          fi

      - name: Create PR on i18n-update branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git fetch origin
          
          # Create or switch to i18n-update
          if git fetch origin i18n-update 2>/dev/null; then
            git checkout i18n-update
          else
            git checkout -b i18n-update origin/main
          fi
          
          # Only copy translation files, NOT everything
          git checkout i18n-working -- README.*.md DOCS.*.md 2>/dev/null || true
          find apps -name "*.en.md" -o -name "*.fr.md" -o -name "*.es.md" \
            -o -name "*.it.md" -o -name "*.pt.md" -o -name "*.nl.md" \
            -o -name "*.pl.md" -o -name "*.ru.md" -o -name "*.ja.md" -o -name "*.zh.md" | \
            xargs -I {} git checkout i18n-working -- {} 2>/dev/null || true
          
          # Also copy translated YAML/JSON files
          find apps -path "*/translations/*.en.*" -o -path "*/translations/*.fr.*" \
            -o -path "*/translations/*.es.*" | \
            xargs -I {} git checkout i18n-working -- {} 2>/dev/null || true
          
          git add .
          
          if ! git diff --cached --quiet; then
            git commit -m "chore(i18n): update translations" || true
            git push -u origin i18n-update || true
          fi

      - name: Create or update PR
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_ID=$(gh pr list --base main --head i18n-update --json number --jq '.[0].number' 2>/dev/null || echo "")
          
          if [ -z "$PR_ID" ]; then
            echo "Creating new PR..."
            gh pr create --base main --head i18n-update --title "🌍 Update translations" --body "Automatic translation update" || echo "PR creation in progress or already exists"
          else
            echo "PR #$PR_ID already exists"
          fi

      - name: Cleanup i18n-working branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git push origin --delete i18n-working 2>/dev/null || true
          echo "i18n-working branch deleted"
