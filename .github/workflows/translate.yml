name: Automatic Translation

on:
  workflow_dispatch:
    inputs:
      translate_all:
        description: "Translate all files (ignore change detection)"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "DOCS.md"
      - "apps/**/README.md"
      - "apps/**/DOCS.md"
      - "apps/**/translations/de.yaml"
      - "apps/**/translations/de.yml"
      - "apps/**/translations/de.json"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: i18n
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check for changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.translate_all }}" = "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "translate_mode=all" >> $GITHUB_OUTPUT
            echo "Translate ALL mode enabled"
            find . -type f \( -name "README.md" -o -name "DOCS.md" -o -path "*/translations/de.*" \) > /tmp/changed.txt
            cat /tmp/changed.txt
          else
            git diff --name-only HEAD~1 HEAD | grep -E '(README|DOCS|translations/de)' > /tmp/changed.txt || true
            if [ -s /tmp/changed.txt ]; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "translate_mode=changed" >> $GITHUB_OUTPUT
              echo "Translate CHANGED files mode"
              cat /tmp/changed.txt
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "No changes detected"
            fi
          fi

      - name: Setup or update i18n-update branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          if git fetch origin i18n-update 2>/dev/null; then
            echo "i18n-update branch exists, checking out..."
            git checkout i18n-update
            git checkout origin/main -- README.md DOCS.md apps/
            git add README.md DOCS.md apps/ || true
            if ! git diff --cached --quiet; then
              git commit -m "chore(i18n): sync sources from main"
              git push origin i18n-update
            fi
          else
            echo "i18n-update branch does not exist, creating..."
            git checkout -b i18n-update origin/main
          fi

      - name: Setup Python
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check.outputs.has_changes == 'true'
        run: pip install requests pyyaml

      - name: Run translation
        if: steps.check.outputs.has_changes == 'true'
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          TARGET_LANGUAGES: ${{ vars.TARGET_LANGUAGES }}
          TRANSLATE_MODE: ${{ steps.check.outputs.translate_mode }}
        run: |
          if [ "$TRANSLATE_MODE" = "all" ]; then
            python .github/scripts/translate.py --all /tmp/changed.txt
          else
            python .github/scripts/translate.py /tmp/changed.txt
          fi

      - name: Commit translations and cache to i18n-update branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          find . -type f \( -name "*.en.md" -o -name "*.fr.md" -o -name "*.es.md" \
            -o -name "*.en.yaml" -o -name "*.fr.yaml" -o -name "*.es.yaml" \
            -o -name "*.en.yml" -o -name "*.fr.yml" -o -name "*.es.yml" \
            -o -name "*.en.json" -o -name "*.fr.json" -o -name "*.es.json" \
            -o -name "*.it.md" -o -name "*.pt.md" -o -name "*.nl.md" \
            -o -name "*.pl.md" -o -name "*.ru.md" -o -name "*.ja.md" -o -name "*.zh.md" \) \
            -exec git add {} \;
          
          git add -f .i18n_cache/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(i18n): update translations and cache"
          git push origin i18n-update

      - name: Create or update PR
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_ID=$(gh pr list --base main --head i18n-update --json number --jq '.[0].number' 2>/dev/null || echo "")
          
          if [ -z "$PR_ID" ]; then
            echo "Creating new PR..."
            gh pr create --base main --head i18n-update --title "🌍 Update translations" --body "Automatic translation update" || echo "PR creation in progress or already exists"
          else
            echo "PR #$PR_ID already exists"
          fi
