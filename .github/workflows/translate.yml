name: Automatic Translation

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "README.md"
      - "DOCS.md"
      - "apps/**/README.md"
      - "apps/**/DOCS.md"
      - "apps/**/translations/de.yaml"
      - "apps/**/translations/de.yml"
      - "apps/**/translations/de.json"
      - ".github/scripts/translate.py"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: i18n
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch branches
        run: |
          git fetch origin --prune

      - name: Checkout or create i18n-update
        run: |

          if git ls-remote --exit-code --heads origin i18n-update; then

            git checkout i18n-update
            git pull origin i18n-update

          else

            git checkout -b i18n-update origin/main

          fi

      - name: Rebase on latest main
        run: |

          git fetch origin main

          if ! git rebase origin/main; then
            echo "::error::Rebase failed."
            git rebase --abort
            exit 1
          fi

      - name: Update translate.py from main
        run: |

          git checkout origin/main -- .github/scripts/translate.py

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Get changed files
        id: changes
        run: |

          # Get files changed compared to main
          git diff --name-only origin/main...HEAD | grep -E '(README|DOCS|translations/de)' > changed_files.txt || true

          echo "Files changed:"
          cat changed_files.txt || echo "(none)"

          if [ -s changed_files.txt ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare cache directory
        run: |

          # Restore cache files from i18n-update branch if they exist
          mkdir -p .i18n_cache

          if git cat-file -e HEAD:.i18n_cache/translation_cache.json 2>/dev/null; then
            git show HEAD:.i18n_cache/translation_cache.json > .i18n_cache/translation_cache.json
          fi

          if git cat-file -e HEAD:.i18n_cache/changed_files.json 2>/dev/null; then
            git show HEAD:.i18n_cache/changed_files.json > .i18n_cache/changed_files.json
          fi

      - name: Run translator
        if: steps.changes.outputs.has_changes == 'true'
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          TARGET_LANGUAGES: ${{ vars.TARGET_LANGUAGES }}
        run: |

          if [ -f changed_files.txt ] && [ -s changed_files.txt ]; then
            python .github/scripts/translate.py changed_files.txt
          else
            echo "No German files changed, skipping translation"
          fi

      - name: Clean up workspace
        run: |

          # Remove original German source files (keep only translations)
          git checkout HEAD -- . || true

      - name: Restore translations only
        run: |

          # Keep only the generated translation files
          git add .i18n_cache/ || true

          # Find and add all generated translation files
          find . -name "*.en.md" -o -name "*.fr.yaml" -o -name "*.es.json" | while read f; do
            git add "$f" || true
          done

          # Also add all language-specific files that were generated
          git ls-files -o --exclude-standard | grep -E '\.(en|fr|es|it|pt|nl|pl|ru|ja|zh|de)\.(md|yaml|yml|json)$' | while read f; do
            git add "$f" || true
          done

      - name: Commit translation changes
        id: commit
        run: |

          git add .i18n_cache/ || true

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit \
            -m "chore(i18n): update translations"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push i18n-update
        if: steps.commit.outputs.changed == 'true'
        run: |

          git push origin i18n-update --force-with-lease

      - name: Check for existing PR
        id: pr
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          NUMBER=$(
            gh pr list \
              --base main \
              --head i18n-update \
              --state open \
              --json number \
              --jq '.[0].number'
          )

          if [ -z "$NUMBER" ]; then
            echo "number=" >> "$GITHUB_OUTPUT"
          else
            echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: |
          steps.commit.outputs.changed == 'true' &&
          steps.pr.outputs.number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          gh pr create \
            --base main \
            --head i18n-update \
            --title "chore(i18n): automatic translation update" \
            --body "$(cat <<'EOF'
This PR was created automatically by the translation workflow.

### Updated

- Documentation (README, DOCS files)
- Translation files (de.yaml, de.json)

Only changed German source files are translated and committed.

Generated by GitHub Actions.
EOF
          )"

      - name: Update existing PR
        if: |
          steps.commit.outputs.changed == 'true' &&
          steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          PR=${{ steps.pr.outputs.number }}

          gh pr edit "$PR" \
            --body "$(cat <<'EOF'
This PR was updated automatically by the translation workflow.

### Updated

- Documentation (README, DOCS files)
- Translation files (de.yaml, de.json)

Only changed German source files are translated and committed.

Last updated: $(date -Iseconds)
EOF
          )"

      - name: Update labels
        if: |
          steps.commit.outputs.changed == 'true' &&
          steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          PR=${{ steps.pr.outputs.number }}

          gh pr edit "$PR" \
            --add-label i18n \
            --add-label automated || true

      - name: Comment on PR
        if: |
          steps.commit.outputs.changed == 'true' &&
          steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          PR=${{ steps.pr.outputs.number }}

          # Check if comment already exists from today
          EXISTING=$(
            gh pr view "$PR" --json comments --jq '.comments[] | select(.author.login == "github-actions[bot]" and (.createdAt | startswith(now | todate))) | .id' | head -1
          )

          if [ -z "$EXISTING" ]; then
            gh pr comment "$PR" \
              -b "✅ Updated translations on $(date -Iseconds)"
          fi
