name: Automatic Translation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "DOCS.md"
      - "apps/**/README.md"
      - "apps/**/DOCS.md"
      - "apps/**/translations/de.yaml"
      - "apps/**/translations/de.yml"
      - "apps/**/translations/de.json"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: i18n
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check for changes
        id: check
        run: |
          git diff --name-only HEAD~1 HEAD | grep -E '(README|DOCS|translations/de)' > /tmp/changed.txt || true
          if [ -s /tmp/changed.txt ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            cat /tmp/changed.txt
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup branches
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git fetch origin i18n-update --depth=1 2>/dev/null || true
          git push origin --delete i18n-update 2>/dev/null || true
          git checkout -b i18n-update origin/main

      - name: Setup Python
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check.outputs.has_changes == 'true'
        run: pip install requests pyyaml

      - name: Run translation
        if: steps.check.outputs.has_changes == 'true'
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          TARGET_LANGUAGES: ${{ vars.TARGET_LANGUAGES }}
        run: python .github/scripts/translate.py /tmp/changed.txt

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          find . -type f \( -name "*.en.md" -o -name "*.fr.md" -o -name "*.es.md" \
            -o -name "*.en.yaml" -o -name "*.fr.yaml" -o -name "*.es.yaml" \
            -o -name "*.en.yml" -o -name "*.fr.yml" -o -name "*.es.yml" \
            -o -name "*.en.json" -o -name "*.fr.json" -o -name "*.es.json" \
            -o -name "*.it.md" -o -name "*.pt.md" -o -name "*.nl.md" \
            -o -name "*.pl.md" -o -name "*.ru.md" -o -name "*.ja.md" -o -name "*.zh.md" \) \
            -exec git add {} \;
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(i18n): update translations"
          git push origin i18n-update

      - name: Create or update PR
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_ID=$(gh pr list --base main --head i18n-update --json number --jq '.[0].number' 2>/dev/null || echo "")
          
          if [ -z "$PR_ID" ]; then
            echo "Creating new PR..."
            gh pr create --base main --head i18n-update --title "🌍 Update translations" --body "Automatic translation update" || echo "PR creation in progress or already exists"
          else
            echo "PR #$PR_ID already exists"
          fi
