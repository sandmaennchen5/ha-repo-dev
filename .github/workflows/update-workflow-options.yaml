name: Update Workflow App List

on:
  push:
    branches:
      - main
    paths:
      - "apps/**/config.yaml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Update dropdown in workflow
        run: python3 .github/scripts/update_workflow_app_options.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
          commit-message: "chore: update app dropdown options"
          branch: update-app-dropdown
          title: "Update app dropdown options"
          body: "Automated update of app dropdown options in hasos_app.yml."
          delete-branch: true
