name: i18n Update

on:
  workflow_dispatch:

jobs:
  update-i18n:
    runs-on: ubuntu-latest

    steps:
      # 1. MAIN auschecken
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: main

      # 2. Prüfen, ob Branch existiert – wenn nicht, erstellen
      - name: Create branch if missing
        run: |
          cd main
          if git ls-remote --exit-code --heads origin i18n-update; then
            echo "Branch exists"
          else
            echo "Branch missing → creating"
            git checkout -b i18n-update
            git push origin i18n-update
          fi

      # 3. Ziel-Branch auschecken
      - name: Checkout i18n-update
        uses: actions/checkout@v4
        with:
          ref: i18n-update
          fetch-depth: 0
          path: target

      # 4. Dateien aus main vorbereiten
      - name: Prepare selected files
        run: |
          mkdir selected
          # Alle README.md in Apps/*/
          cp -r main/Apps/*/README.md selected/ 2>/dev/null || true
          # Übersetzungen
          cp -r main/Apps/Translation selected
