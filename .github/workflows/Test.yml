name: i18n Update

on:
  workflow_dispatch:

jobs:
  update-i18n:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: main

      # Prüfen, ob Branch existiert
      - name: Check if branch exists
        id: check
        run: |
          cd main
          if git ls-remote --exit-code --heads origin i18n-update; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # Branch erstellen, wenn er fehlt
      - name: Create branch if missing
        if: steps.check.outputs.exists == 'false'
        run: |
          cd main
          git checkout -b i18n-update
          git push origin i18n-update

      # Branch auschecken
      - name: Checkout i18n-update
        uses: actions/checkout@v4
        with:
          ref: i18n-update
          fetch-depth: 0
          path: target

      # Branch NUR LEEREN, wenn er NEU erstellt wurde
      - name: Clear branch if new
        if: steps.check.outputs.exists == 'false'
        run: |
          cd target
          find . -mindepth 1 ! -name ".git" -exec rm -rf {} +

      # Dateien vorbereiten
      - name: Prepare selected files
        run: |
          mkdir selected
          cp -r main/Apps/*/README.md selected/ 2>/dev/null || true

      # Dateien überschreiben (NICHT löschen)
      - name: Copy selected files
        run: |
          cp -r selected/* target/ 2>/dev/null || true

      # Commit + Push
      - name: Commit and push
        run: |
          cd target
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "i18n update" || echo "No changes"
          git push origin i18n-update
