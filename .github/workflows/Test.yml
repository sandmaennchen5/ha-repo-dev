name: Create empty branch

on:
  workflow_dispatch:

jobs:
  create-empty-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create empty branch
        run: |
          # Prüfen, ob Branch existiert
          if git ls-remote --exit-code --heads origin leerer-branch; then
            echo "Branch exists, recreating empty version"
            git checkout leerer-branch
          else
            echo "Branch missing, creating new empty branch"
            git checkout --orphan leerer-branch
          fi

          # Alles löschen
          git rm -rf . || true

          # Leeren Commit erstellen
          git commit --allow-empty -m "Initialize empty branch"

          # Push erzwingen
          git push -f origin leerer-branch
