name: Badge & Schema Lint

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - ".github/config.yaml"
      - "apps/**/.var.yaml"
      - "apps/**/config.yaml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Validate schema
        run: python .github/scripts/schema_validator.py

      - name: Health check
        run: python .github/scripts/health_check.py
